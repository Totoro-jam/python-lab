[project]
name = "pylab10"
version = "0.1.0"
description = "python-lab chapter 10 — FastAPI CRUD with Pydantic + dependency injection"
requires-python = ">=3.11"
dependencies = ["fastapi>=0.100", "pydantic>=2.0"]

[project.optional-dependencies]
dev = ["pytest>=8", "httpx>=0.25"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pylab10"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
