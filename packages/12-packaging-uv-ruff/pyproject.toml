[project]
name = "pylab12"
version = "0.1.0"
description = "python-lab chapter 12 — packaging with uv & ruff"
requires-python = ">=3.11"
dependencies = ["tomli>=2; python_version < '3.11'"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
pylab12 = "pylab12.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pylab12"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
