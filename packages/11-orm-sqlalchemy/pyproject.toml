[project]
name = "pylab11"
version = "0.1.0"
description = "python-lab chapter 11 — SQLAlchemy 2.x ORM with relationships"
requires-python = ">=3.11"
dependencies = ["sqlalchemy>=2.0"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pylab11"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
