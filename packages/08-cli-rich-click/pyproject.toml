[project]
name = "pylab08"
version = "0.1.0"
description = "python-lab chapter 08 — CLI with typer + rich"
requires-python = ">=3.11"
dependencies = ["typer>=0.9", "rich>=13"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
pylab08 = "pylab08.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pylab08"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
