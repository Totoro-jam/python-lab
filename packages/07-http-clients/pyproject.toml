[project]
name = "pylab07"
version = "0.1.0"
description = "python-lab chapter 07 — HTTP clients: httpx, retry, timeout"
requires-python = ">=3.11"
dependencies = ["httpx>=0.25"]

[project.optional-dependencies]
dev = ["pytest>=8", "respx>=0.20"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pylab07"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
